# ============================================================
#  Nginx 反向代理配置示例
#  部署到：/etc/nginx/sites-available/huzoo.conf
#  软链接到：/etc/nginx/sites-enabled/huzoo.conf
#
#  作用：
#  1. 处理 HTTPS（Let's Encrypt 免费证书）
#  2. 把所有请求转发给本地 3000 端口的 Node 服务
#  3. 优化静态文件传输（gzip 压缩）
#
#  使用前：把 yourdomain.com 换成你的真实域名
# ============================================================

# HTTP -> HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    # Let's Encrypt 证书申请验证用（certbot 会自动配置）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL 证书（certbot 申请后会自动填好这两行）
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # gzip 压缩（让传输更快）
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # 反向代理到 Node 服务（PM2 跑在 3000 端口）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传体积限制（与后端 100kb 限制保持一致）
    client_max_body_size 1m;
}
